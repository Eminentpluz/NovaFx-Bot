function PE(b,p,v){this.base=b;this.pip=p;this.vol=v;this.price=b;this.trend=0;this.mom=0;
this.h=[];for(var i=0;i<200;i++)this.h.push(b+(i-200)*.001*p*v+(Math.random()-.5)*p*8*v)}
PE.prototype.tick=function(sp){
this.trend+=(Math.random()-.5)*.3;this.trend*=.97;
this.mom=this.mom*.85+this.trend*.15;
this.price+=this.mom*this.pip*.5+(this.base-this.price)*.002+(Math.random()-.5)*this.pip*3*this.vol+(Math.random()<.02?(Math.random()-.5)*this.pip*15:0);
this.h.push(this.price);if(this.h.length>300)this.h.shift();
return{bid:this.price,ask:this.price+sp*this.pip}
};
