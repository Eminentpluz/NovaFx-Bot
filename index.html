class PE{
constructor(b,p,v){this.base=b;this.pip=p;this.vol=v;this.price=b;this.trend=0;this.mom=0;
this.h=Array.from({length:200},(_,i)=>b+(i-200)*.001*p*v+(Math.random()-.5)*p*8*v)}
tick(sp){this.trend+=(Math.random()-.5)*.3;this.trend*=.97;this.mom=this.mom*.85+this.trend*.15;
this.price+=this.mom*this.pip*.5+(this.base-this.price)*.002+(Math.random()-.5)*this.pip*3*this.vol+(Math.random()<.02?(Math.random()-.5)*this.pip*15:0);
this.h.push(this.price);if(this.h.length>300)this.h.shift();return{bid:this.price,ask:this.price+sp*this.pip}}
}

function cEma(d,p){if(d.length<p)return[];const k=2/(p+1);const r=[d.slice(0,p).reduce((a,b)=>a+b,0)/p];for(let i=p;i<d.length;i++)r.push(d[i]*k+r[r.length-1]*(1-k));return r}
function cRsi(d,p=14){if(d.length<p+1)return 50;let g=0,l=0;for(let i=d.length-p;i<d.length;i++){const x=d[i]-d[i-1];x>0?g+=x:l-=x}return l===0?100:100-100/(1+g/l)}
function cMacd(d){const a=cEma(d,12),b=cEma(d,26);if(!a.length||!b.length)return{h:0};const o=a.length-b.length;const ml=a.slice(o).map((v,i)=>v-b[i]);const s=cEma(ml,9);return{h:(ml[ml.length-1]||0)-(s[s.length-1]||0)}}
function cBb(d,p=20){if(d.length<p)return{w:0};const s=d.slice(-p),m=s.reduce((a,b)=>a+b,0)/p;const std=Math.sqrt(s.reduce((a,b)=>a+(b-m)**2,0)/p);return{u:m+std*2,l:m-std*2,w:std*4/m}}

function gSig(h,pair,st){
const r=cRsi(h),m=cMacd(h),b=cBb(h),e8=cEma(h,8),e21=cEma(h,21);
const p=h[h.length-1],ef=e8[e8.length-1]||p,es=e21[e21.length-1]||p;
let sc=0,re=[],dir=ef>es?“BUY”:“SELL”;
sc+=15;re.push(ef>es?“EMA bullish”:“EMA bearish”);
if(r<30){sc+=25;re.push(“RSI oversold”);dir=“BUY”}else if(r>70){sc+=25;re.push(“RSI overbought”);dir=“SELL”}
else if((r<45&&dir===“BUY”)||(r>55&&dir===“SELL”)){sc+=10;re.push(“RSI confirm”)}
if((m.h>0&&dir===“BUY”)||(m.h<0&&dir===“SELL”)){sc+=20;re.push(“MACD aligned”)}
if((p<=(b.l||0)&&dir===“BUY”)||(p>=(b.u||99999)&&dir===“SELL”)){sc+=20;re.push(“BB touch”)}
const conf=Math.min(.99,Math.max(.35,sc/100));
const s=r<30||r>70?st[2]:(b.w||0)>.003?st[3]:Math.abs(m.h)>pair.pip*2?st[1]:st[0];
return{dir,conf,re,s,rsi:r,macd:m,bb:b}
}

}
