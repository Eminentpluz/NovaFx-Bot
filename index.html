<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06080d">
<title>Neural FX Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:#06080d;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;color:#c8cdd5;font-size:12px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes tpFlash{0%,100%{background:#00ff8808}50%{background:#00ff8818}}
@keyframes bgO{0%,100%{border-color:#ff980030}50%{border-color:#ff980055}}
@keyframes glowO{0%,100%{box-shadow:0 0 10px #ff980025}50%{box-shadow:0 0 20px #ff980045}}
input{background:#0d1220;border:1px solid #1a2538;border-radius:8px;padding:12px 14px;color:#fff;font-family:inherit;font-size:14px;width:100%;outline:none;-webkit-appearance:none}
input:focus{border-color:#1565C040}
input::placeholder{color:#2a3548}
input[type=range]{-webkit-appearance:none;height:6px;background:#1a2538;border:none;border-radius:3px;padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #2196F3}
.card{background:#0b1019;border:1px solid #131b27;border-radius:10px;padding:12px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.btn{border:none;cursor:pointer;border-radius:8px;font-family:inherit;font-weight:600;padding:12px;width:100%;font-size:11px}
.srv{padding:12px 14px;cursor:pointer;border-bottom:1px solid #0e1420;font-size:13px;color:#8892a4}
.srv:active{background:#1a2538}
.flex{display:flex}.col{flex-direction:column}.gap8{gap:8px}.gap6{gap:6px}.between{justify-content:space-between}.center{align-items:center}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#0a0e16;display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:50}
.bottomnav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;font-family:inherit}
.bottomnav span:first-child{font-size:18px}
.bottomnav span:last-child{font-size:8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PAIRS=[{s:"EURUSD",l:"EUR/USD",base:1.0842,pip:0.0001,sp:1.2,vol:0.6,d:5},{s:"GBPUSD",l:"GBP/USD",base:1.2673,pip:0.0001,sp:1.5,vol:0.7,d:5},{s:"USDJPY",l:"USD/JPY",base:154.32,pip:0.01,sp:1.0,vol:0.65,d:3},{s:"AUDUSD",l:"AUD/USD",base:0.6534,pip:0.0001,sp:1.3,vol:0.55,d:5},{s:"USDCHF",l:"USD/CHF",base:0.8821,pip:0.0001,sp:1.4,vol:0.5,d:5},{s:"GBPJPY",l:"GBP/JPY",base:195.48,pip:0.01,sp:2.0,vol:0.85,d:3},{s:"XAUUSD",l:"XAU/USD",base:2340.50,pip:0.01,sp:3.0,vol:0.9,d:2}];
var STRATS=[{name:"SCALP",tp:3,sl:12,color:"#00ff88"},{name:"MOMENTUM",tp:8,sl:18,color:"#a78bfa"},{name:"REVERSAL",tp:5,sl:15,color:"#f472b6"},{name:"BREAKOUT",tp:12,sl:22,color:"#38bdf8"}];
var SERVERS=["Headway-Real","Headway-Real2","Headway-Real3","ICMarkets-Live01","ICMarkets-Live02","ICMarkets-Live03","Pepperstone-Edge01","Pepperstone-Edge02","Exness-Real","Exness-Real2","Exness-Real3","FPMarkets-Live","XMGlobal-MT5","Tickmill-Live","Admirals-Live","FXTM-ECN","HFMarkets-Live","Axi-Live","VantageFX-Live","FxPro-MT5","OctaFX-Real","Headway-Demo","ICMarkets-Demo","Pepperstone-Demo","Exness-Trial","XMGlobal-Demo","Tickmill-Demo"];

/* Price Engine */
function PE(b,p,v){this.base=b;this.pip=p;this.vol=v;this.price=b;this.trend=0;this.mom=0;this.hist=[];for(var i=0;i<200;i++)this.hist.push(b+(i-200)*0.001*p*v+(Math.random()-0.5)*p*8*v)}
PE.prototype.tick=function(sp){this.trend+=(Math.random()-0.5)*0.3;this.trend*=0.97;this.mom=this.mom*0.85+this.trend*0.15;this.price+=this.mom*this.pip*0.5+(this.base-this.price)*0.002+(Math.random()-0.5)*this.pip*3*this.vol;if(Math.random()<0.02)this.price+=(Math.random()-0.5)*this.pip*15;this.hist.push(this.price);if(this.hist.length>300)this.hist.shift();return{bid:this.price,ask:this.price+sp*this.pip}};

/* TA */
function cE(d,p){if(d.length<p)return[];var k=2/(p+1),r=[d.slice(0,p).reduce(function(a,b){return a+b},0)/p];for(var i=p;i<d.length;i++)r.push(d[i]*k+r[r.length-1]*(1-k));return r}
function cR(d){if(d.length<15)return 50;var g=0,l=0;for(var i=d.length-14;i<d.length;i++){var x=d[i]-d[i-1];x>0?g+=x:l-=x}return l===0?100:100-100/(1+g/l)}
function cM(d){var a=cE(d,12),b=cE(d,26);if(!a.length||!b.length)return{h:0};var o=a.length-b.length,ml=a.slice(o).map(function(v,i){return v-b[i]}),s=cE(ml,9);return{h:(ml[ml.length-1]||0)-(s[s.length-1]||0)}}
function gS(h,pair,st){var r=cR(h),m=cM(h),e8=cE(h,8),e21=cE(h,21),p=h[h.length-1],ef=e8[e8.length-1]||p,es=e21[e21.length-1]||p;var sc=0,re=[],dir=ef>es?“BUY”:“SELL”;sc+=15;re.push(ef>es?“EMA bull”:“EMA bear”);if(r<30){sc+=25;re.push(“RSI oversold”);dir=“BUY”}else if(r>70){sc+=25;re.push(“RSI overbought”);dir=“SELL”}if((m.h>0&&dir===“BUY”)||(m.h<0&&dir===“SELL”)){sc+=20;re.push(“MACD aligned”)}var conf=Math.min(0.99,Math.max(0.35,sc/100)),s=r<30||r>70?st[2]:st[0];return{dir:dir,conf:conf,re:re,s:s,rsi:r}}

/* Storage */
function savL(a,b,c,d){try{localStorage.setItem(“nfx”,JSON.stringify({s:a,l:b,p:btoa(c),t:d}))}catch(x){}}
function ldL(){try{var d=JSON.parse(localStorage.getItem(“nfx”));if(!d)return null;d.p=atob(d.p);return d}catch(x){return null}}
function clL(){try{localStorage.removeItem(“nfx”);localStorage.removeItem(“nfx_cfg”)}catch(x){}}
function savC(a,b,c,d){try{localStorage.setItem(“nfx_cfg”,JSON.stringify({mc:a,lt:b,mo:c,sp:d}))}catch(x){}}
function ldC(){try{var d=JSON.parse(localStorage.getItem(“nfx_cfg”));return d||{mc:0.65,lt:0.10,mo:5,sp:500}}catch(x){return{mc:0.65,lt:0.10,mo:5,sp:500}}}

/* State */
var state={scr:“login”,step:0,srv:””,sSearch:””,showSrv:false,lid:””,pw:””,aT:“live”,rem:false,aI:null,cLog:[],engines:{},prices:{},trades:[],signals:[],bal:10000,eq:10000,stats:{w:0,l:0,pips:0,str:0,best:0,pft:0},on:false,tab:“market”,mc:0.65,lot:0.10,mo:5,spd:500,logs:[]};
var sv=ldL();var cfg=ldC();
if(sv){state.srv=sv.s;state.lid=sv.l;state.pw=sv.p;state.aT=sv.t;state.rem=true}
state.mc=cfg.mc;state.lot=cfg.lt;state.mo=cfg.mo;state.spd=cfg.sp;
var interval=null,tick=0;

/* Init engines */
PAIRS.forEach(function(p){state.engines[p.s]=new PE(p.base,p.pip,p.vol);state.prices[p.s]={bid:p.base,ask:p.base+p.sp*p.pip,h:state.engines[p.s].hist.slice()}});

function addLog(m,ty){state.logs.unshift({t:new Date(),m:m,ty:ty||“info”});if(state.logs.length>100)state.logs.pop()}
function render(){document.getElementById(“app”).innerHTML=state.scr===“login”?renderLogin():renderTrade()}
function $(sel){return document.querySelector(sel)}

/* Chart SVG */
function chartSvg(data,color,w,h){
if(!data||data.length<3)return””;
var d=data.slice(-60),mn=Math.min.apply(null,d),mx=Math.max.apply(null,d),rng=mx-mn||1;
var pts=d.map(function(v,i){return(i/(d.length-1))*w+”,”+(h-((v-mn)/rng)*(h-4)-2)}).join(” “);
return’<svg width=“100%” height=”’+h+’” viewBox=“0 0 ‘+w+” “+h+’” preserveAspectRatio=“none” style=“display:block”><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round"/></svg>’;
}

/* TP Bar */
function tpBar(pips,tp,sl,color){
var t=tp+sl,pos=Math.max(0,Math.min(1,(pips+sl)/t)),pct=Math.max(0,Math.min(100,(pips/tp)*100)),near=pct>=65;
var c=pips>0?(color||”#00ff88”):”#ff4757”;
var fillW=pips>0?Math.min(pips/t,tp/t)*100:0;
var lossW=pips<0?(Math.abs(pips)/t)*100:0;
return’<div><div class="flex between" style="margin-bottom:3px"><span style="font-size:9px;color:#ff4757">SL</span><span style=“font-size:10px;font-weight:700;color:’+(near?”#00ff88”:”#6b7a8e”)+’”>’+(near?”\u26A1 “:””)+pct.toFixed(0)+’% \u2192 TP</span><span style="font-size:9px;color:#00ff88">TP</span></div><div style="position:relative;width:100%;height:8px;background:#0e1420;border-radius:4px;overflow:hidden">’+(pips>0?’<div style=“position:absolute;left:’+(sl/t)*100+’%;height:100%;width:’+fillW+’%;background:’+(near?c:c+“80”)+’;border-radius:3px;transition:width .3s”></div>’:””)+(pips<0?’<div style="position:absolute;right:'+(1-pos)*100+'%;height:100%;width:'+lossW+'%;background:#ff475760;border-radius:3px"></div>’:””)+’<div style=“position:absolute;top:50%;left:’+pos*100+’%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);background:’+c+”;border:2px solid #fff;box-shadow:0 0 6px “+c+‘80;transition:left .3s;z-index:2”></div></div><div class="flex between" style="margin-top:2px"><span style="font-size:9px;color:#3e4a5c">-’+sl+‘p</span><span style="font-size:9px;color:#3e4a5c">+’+tp+“p</span></div></div>”;
}

/* Login Screen */
function renderLogin(){
var ac=state.aT===“live”?”#ff9800”:”#2196F3”;
var html=’<div style="min-height:100vh;background:#0a0e16;display:flex;align-items:center;justify-content:center;padding:20px 16px"><div style="width:100%;max-width:400px;animation:fadeUp .5s ease">’;
html+=’<div style="text-align:center;margin-bottom:24px"><div style="width:60px;height:60px;border-radius:14px;margin:0 auto 12px;background:linear-gradient(135deg,#1565C0,#2196F3);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff">MT5</div><div style="font-weight:900;font-size:20px;color:#fff">MetaTrader 5</div><div style="font-size:10px;color:#4a5568;letter-spacing:2px;margin-top:2px">NEURAL FX ENGINE</div></div>’;
if(state.step===0){
if(sv)html+=’<div style="margin-bottom:14px;padding:10px;border-radius:8px;background:#00ff8808;border:1px solid #00ff8825;display:flex;align-items:center;gap:8px"><span style="font-size:16px">\u2705</span><div><div style="font-size:11px;color:#00ff88;font-weight:700">Login saved</div><div style="font-size:10px;color:#00ff8860">’+sv.s+” #”+sv.l+”</div></div></div>”;
html+=’<div class="flex gap8" style="margin-bottom:16px"><button onclick=“state.aT='live';render()” style=“flex:1;padding:12px;border:2px solid ‘+(state.aT===“live”?”#ff9800”:”#1a2538”)+”;border-radius:8px;background:”+(state.aT===“live”?”#ff980010”:“transparent”)+”;color:”+(state.aT===“live”?”#ff9800”:”#3e4a5c”)+’;cursor:pointer;font-family:inherit”><div style="font-size:12px;font-weight:700">’+(state.aT===“live”?”\u25C9”:”\u25CB”)+’ LIVE</div><div style="font-size:10px;opacity:.6;margin-top:2px">Real funds</div></button><button onclick=“state.aT='demo';render()” style=“flex:1;padding:12px;border:2px solid ‘+(state.aT===“demo”?”#2196F3”:”#1a2538”)+”;border-radius:8px;background:”+(state.aT===“demo”?”#2196F310”:“transparent”)+”;color:”+(state.aT===“demo”?”#2196F3”:”#3e4a5c”)+’;cursor:pointer;font-family:inherit”><div style="font-size:12px;font-weight:700">’+(state.aT===“demo”?”\u25C9”:”\u25CB”)+’ DEMO</div><div style="font-size:10px;opacity:.6;margin-top:2px">Testing</div></button></div>’;
html+=’<div style="margin-bottom:14px;position:relative"><div style="font-size:11px;color:#4a5568;margin-bottom:5px">SERVER</div><input id="srvInput" placeholder="Search server..." value="'+(state.srv||state.sSearch)+'" onfocus="state.showSrv=true;render()" oninput="state.sSearch=this.value;state.srv=\'\';state.showSrv=true;render()">’;
if(state.showSrv){
var items=SERVERS.filter(function(s){return s.toLowerCase().indexOf((state.sSearch||””).toLowerCase())!==-1});
var lv=items.filter(function(s){return s.indexOf(“Demo”)===-1&&s.indexOf(“Trial”)===-1});
var dm=items.filter(function(s){return s.indexOf(“Demo”)!==-1||s.indexOf(“Trial”)!==-1});
html+=’<div style="position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:#0d1220;border:1px solid #1a2538;border-radius:0 0 8px 8px;z-index:20">’;
if(lv.length)html+=’<div style="padding:8px 14px;font-size:10px;color:#ff9800;background:#ff980008;border-bottom:1px solid #1a2538;font-weight:700">LIVE</div>’;
lv.forEach(function(s){html+=’<div class="srv" onclick="state.srv=\''+s+'\';state.sSearch=\'\';state.showSrv=false;render()">\u25CF ‘+s+”</div>”});
if(dm.length)html+=’<div style="padding:8px 14px;font-size:10px;color:#2196F3;background:#2196F308;border-bottom:1px solid #1a2538;font-weight:700">DEMO</div>’;
dm.forEach(function(s){html+=’<div class="srv" onclick="state.srv=\''+s+'\';state.aT=\'demo\';state.sSearch=\'\';state.showSrv=false;render()">\u25CF ‘+s+”</div>”});
html+=”</div>”;
}
html+=”</div>”;
html+=’<div style="margin-bottom:14px"><div style="font-size:11px;color:#4a5568;margin-bottom:5px">LOGIN ID</div><input placeholder="e.g. 51234567" value="'+state.lid+'" oninput="state.lid=this.value"></div>’;
html+=’<div style="margin-bottom:14px"><div style="font-size:11px;color:#4a5568;margin-bottom:5px">PASSWORD</div><input placeholder="MT5 password" type="password" value="'+state.pw+'" oninput="state.pw=this.value"></div>’;
html+=’<div onclick="state.rem=!state.rem;render()" style="display:flex;align-items:center;gap:10px;margin-bottom:20px;cursor:pointer;padding:8px 0"><div style=“width:20px;height:20px;border-radius:5px;border:2px solid ‘+(state.rem?”#00ff88”:”#1a2538”)+”;background:”+(state.rem?”#00ff8820”:“transparent”)+’;display:flex;align-items:center;justify-content:center;flex-shrink:0”>’+(state.rem?’<span style="color:#00ff88;font-size:12px;font-weight:700">\u2713</span>’:””)+’</div><div><div style=“font-size:12px;color:’+(state.rem?”#fff”:”#6b7a8e”)+’;font-weight:600”>Remember me</div><div style="font-size:9px;color:#3e4a5c">Save login locally</div></div></div>’;
var canC=state.srv&&state.lid&&state.pw;
html+=’<button onclick=“doConnect()” ‘+(canC?””:“disabled”)+” style="width:100%;padding:16px;border:none;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;background:”+(canC?(state.aT===“live”?“linear-gradient(135deg,#e65100,#ff9800)”:“linear-gradient(135deg,#1565C0,#2196F3)”):”#1a2538”)+”;color:”+(canC?”#fff”:”#3e4a5c”)+”;opacity:”+(canC?1:0.4)+’">’+(state.aT===“live”?”\uD83D\uDD34 CONNECT LIVE”:“CONNECT DEMO”)+”</button>”;
if(state.aT===“live”)html+=’<div style="margin-top:14px;padding:12px;border-radius:8px;background:#ff980008;border:1px solid #ff980025"><div style="font-size:10px;color:#ff9800;font-weight:700">\u26A0 Real funds at risk.</div></div>’;
}else{
html+=’<div style="animation:fadeUp .3s ease"><div style="text-align:center;margin-bottom:16px"><div style=“width:52px;height:52px;border-radius:13px;margin:0 auto 10px;background:’+(state.step===2?”#00ff8820”:ac+“20”)+’;display:flex;align-items:center;justify-content:center;font-size:22px”>’+(state.step===2?”\u2713”:”\u27F3”)+’</div><div style=“font-weight:700;font-size:16px;color:’+(state.step===2?”#00ff88”:”#fff”)+’”>’+(state.step===2?state.aT.toUpperCase()+” Connected!”:“Connecting…”)+”</div></div>”;
html+=’<div style="background:#0d1220;border-radius:10px;padding:14px;border:1px solid #141c28">’;
state.cLog.forEach(function(m){html+=’<div style=“font-size:12px;padding:4px 0;color:’+(m.indexOf(”\u2713”)!==-1?”#00ff88”:”#6b7a8e”)+’”>’+”> “+m+”</div>”});
if(state.step===1)html+=’<span style="color:'+ac+';animation:blink 1s infinite">_</span>’;
html+=”</div></div>”;
}
html+=”</div></div>”;
return html;
}

/* Trading Screen */
function renderTrade(){
var ac=state.aT===“live”?”#ff9800”:”#2196F3”;
var active=state.trades.filter(function(t){return t.status===“LIVE”});
var totT=state.stats.w+state.stats.l;
var wr=totT>0?((state.stats.w/totT)*100).toFixed(1):“0.0”;
var html=””;
/* Header */
html+=’<div style="background:linear-gradient(180deg,#0c1220,#06080d);border-bottom:1px solid '+ac+'20;padding:8px 12px"><div class="flex center between" style="margin-bottom:6px"><div class="flex center gap8"><div style=“width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,’+ac+“cc,”+ac+’);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:#fff;flex-shrink:0”>MT5</div><div><div style="font-weight:700;font-size:12px;color:#fff">’+(state.aI?state.aI.co:””)+(state.on?’ <span style="width:5px;height:5px;border-radius:50%;background:#00ff88;animation:pulse 1.5s infinite;display:inline-block"></span>’:””)+’</div><div style="font-size:9px;color:#4a5568"><span class=“tag” style=“background:’+ac+“18;color:”+ac+’”>’+(state.aT===“live”?”\uD83D\uDD34 LIVE”:“DEMO”)+”</span> #”+(state.aI?state.aI.login:””)+’</div></div></div><div class="flex gap6"><button onclick=“toggleBot()” style=“padding:8px 14px;font-size:11px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;background:’+(state.on?“linear-gradient(135deg,#ff4757,#c0392b)”:“linear-gradient(135deg,”+ac+“cc,”+ac+”)”)+”;color:#fff;animation:”+(state.on?“glowO 2.5s infinite”:“none”)+’”>’+(state.on?”\u25A0”:”\u25B6”)+’</button><button onclick="doLogout()" style="padding:8px 10px;font-size:10px;background:transparent;color:#3e4a5c;border:1px solid #1a2538;border-radius:6px;cursor:pointer;font-family:inherit">\u23CF</button></div></div>’;
html+=’<div class="flex gap6" style="overflow-x:auto;padding-bottom:4px">’;
[{l:“Bal”,v:”$”+state.bal.toFixed(0),c:”#fff”},{l:“Equity”,v:”$”+state.eq.toFixed(0),c:state.eq>=state.bal?”#00ff88”:”#ff4757”},{l:“WR”,v:wr+”%”,c:parseFloat(wr)>=70?”#00ff88”:”#ffaa00”}].forEach(function(s){html+=’<div style="text-align:center;min-width:52px;flex-shrink:0;padding:4px 6px;background:#0b101940;border-radius:6px"><div style="font-size:8px;color:#3e4a5c">’+s.l+’</div><div style="font-size:12px;font-weight:700;color:'+s.c+'">’+s.v+”</div></div>”});
html+=”</div></div>”;

/* Active trades */
if(active.length>0){
html+=’<div style="padding:8px 10px 0"><div class="card" style="animation:bgO 3s infinite"><div class="flex center gap6" style="margin-bottom:8px"><span style="width:7px;height:7px;border-radius:50%;background:#00ff88;animation:pulse 1.5s infinite;display:inline-block"></span><span style="font-size:10px;color:'+ac+';font-weight:700">OPEN \u2014 ‘+active.length+”</span></div>”;
active.forEach(function(t){
var pct=Math.max(0,Math.min(100,(t.pips/t.tpP)*100)),near=pct>=65;
html+=’<div style=“padding:12px;border-radius:8px;background:’+(near?”#0d1220”:”#0b1019”)+”;border:1px solid “+(near?”#00ff8830”:”#141c28”)+”;margin-bottom:8px;animation:”+(near?“tpFlash 2s infinite”:“none”)+’”>’;
html+=’<div class="flex center between" style="margin-bottom:8px"><div class="flex center gap6"><span class=“tag” style=“background:’+(t.dir===“BUY”?”#2196F320”:”#ff475720”)+”;color:”+(t.dir===“BUY”?”#42A5F5”:”#ff4757”)+’”>’+t.dir+’</span><span style="font-weight:800;color:#fff;font-size:14px">’+t.label+’</span><span style="font-size:9px;color:#3e4a5c">#’+t.ticket+’</span></div><div style="text-align:right"><div style=“font-size:16px;font-weight:800;color:’+(t.pips>=0?”#00ff88”:”#ff4757”)+’”>’+(t.pips>=0?”+”:””)+t.pips+‘p</div><div style=“font-size:10px;color:’+((t.pnl||0)>=0?”#00ff8880”:”#ff475780”)+’”>$’+(t.pnl||0).toFixed(2)+”</div></div></div>”;
html+=’<div class="flex between" style="margin-bottom:8px"><div><div style="font-size:9px;color:#3e4a5c">OPEN</div><div style="font-size:12px;color:#6b7a8e">’+t.entry.toFixed(t.dec)+’</div></div><div style="text-align:center"><div style="font-size:9px;color:#3e4a5c">NOW</div><div style="font-size:13px;color:#fff;font-weight:700">’+(t.cur?t.cur.toFixed(t.dec):””)+’</div></div><div style="text-align:right"><div style="font-size:9px;color:#00ff88">T/P</div><div style="font-size:12px;color:#00ff88">’+t.tp.toFixed(t.dec)+”</div></div></div>”;
html+=tpBar(t.pips,t.tpP,t.slP,t.color);
html+=’<div class="flex between" style="margin-top:6px"><span style="font-size:9px;color:#3e4a5c">’+t.strat+” \u00B7 “+t.lot+’lot</span><span style="font-size:9px;color:#3e4a5c">\uD83E\uDDE0 ’+(t.re?t.re[0]:””)+”</span></div></div>”;
});
html+=”</div></div>”;
}

/* Tab content */
html+=’<div style="padding:8px 10px">’;
if(state.tab===“market”){
html+=’<div class="grid2">’;
PAIRS.forEach(function(p){var d=state.prices[p.s];var bid=d?d.bid:p.base,ask=d?d.ask:p.base+p.sp*p.pip;var h=d?d.h:[];var prev=h[h.length-2]||p.base;var up=bid>=prev;
html+=’<div class="card" style="padding:10px"><div style="font-weight:700;color:#fff;font-size:11px;margin-bottom:3px">’+p.l+’</div><div class="flex between" style="margin-bottom:3px"><div><div style="font-size:8px;color:#ff475780">Bid</div><div style=“font-size:14px;font-weight:800;color:’+(up?”#c8cdd5”:”#ff4757”)+’”>’+bid.toFixed(p.d)+’</div></div><div style="text-align:right"><div style="font-size:8px;color:#2196F380">Ask</div><div style=“font-size:14px;font-weight:800;color:’+(up?”#42A5F5”:”#c8cdd5”)+’”>’+ask.toFixed(p.d)+”</div></div></div>”+chartSvg(h,up?ac:”#ff4757”,150,22)+”</div>”});
html+=’</div><div class="card" style="margin-top:8px"><div class="grid3">’;
[{l:“Wins”,v:state.stats.w,c:”#00ff88”},{l:“Losses”,v:state.stats.l,c:”#ff4757”},{l:“Profit”,v:”$”+state.stats.pft.toFixed(0),c:state.stats.pft>=0?”#00ff88”:”#ff4757”}].forEach(function(s){html+=’<div><div style="font-size:9px;color:#3e4a5c">’+s.l+’</div><div style="font-size:15px;font-weight:800;color:'+s.c+'">’+s.v+”</div></div>”});
html+=”</div></div>”;
html+=’<div class="card" style="margin-top:8px;max-height:180px;overflow-y:auto"><div style="font-size:9px;color:#3e4a5c;margin-bottom:6px">LOG</div>’;
state.logs.slice(0,30).forEach(function(l){html+=’<div style=“font-size:10px;padding:3px 0;border-bottom:1px solid #0d1220;color:’+(l.ty===“win”?”#00ff88”:l.ty===“loss”?”#ff4757”:l.ty===“system”?ac:”#4a5568”)+’”>’+l.t.toLocaleTimeString()+” “+l.m+”</div>”});
html+=”</div>”;
}
if(state.tab===“signals”){
html+=’<div class="card"><div style="font-size:9px;color:#3e4a5c;margin-bottom:8px">SIGNALS</div>’;
state.signals.slice(0,25).forEach(function(s,i){var ok=s.conf>=state.mc;
html+=’<div style=“padding:8px 10px;margin-bottom:4px;border-radius:6px;background:’+(ok?”#080c14”:”#07090e”)+”;border-left:3px solid “+(ok?s.color:”#1a2232”)+”;opacity:”+(ok?1:0.3)+’”><div class="flex center between"><div class="flex center gap6"><span class=“tag” style=“background:’+(s.dir===“BUY”?”#2196F318”:”#ff475718”)+”;color:”+(s.dir===“BUY”?”#42A5F5”:”#ff4757”)+’”>’+s.dir+’</span><span style="font-weight:700;color:#fff;font-size:11px">’+s.label+’</span></div><span style=“font-size:11px;color:’+(s.conf>=0.7?”#00ff88”:”#ffaa00”)+’;font-weight:700”>’+(s.conf*100).toFixed(1)+’%</span></div><div style="font-size:9px;color:#3e4a5c;margin-top:3px">\uD83E\uDDE0 ‘+(s.re?s.re[0]:””)+”</div></div>”});
html+=”</div>”;
}
if(state.tab===“history”){
html+=’<div class="card"><div style="font-size:9px;color:#3e4a5c;margin-bottom:8px">CLOSED</div>’;
state.trades.filter(function(t){return t.status!==“LIVE”}).slice(0,30).forEach(function(t){
html+=’<div style="padding:8px 10px;margin-bottom:3px;border-radius:6px;background:#080c14" class="flex center between"><div class="flex center gap6"><span class=“tag” style=“background:’+(t.status===“TP”?”#00ff8812”:”#ff475712”)+”;color:”+(t.status===“TP”?”#00ff88”:”#ff4757”)+’”>’+(t.status===“TP”?”\u2726TP”:”\u2717SL”)+’</span><span style="font-weight:700;color:#fff;font-size:11px">’+t.label+’</span></div><span style=“font-weight:800;font-size:12px;color:’+(t.pips>=0?”#00ff88”:”#ff4757”)+’”>’+(t.pips>=0?”+”:””)+t.pips+“p</span></div>”});
html+=”</div>”;
}
if(state.tab===“settings”){
html+=’<div class="card" style="padding:14px">’;
[{l:“Confidence”,v:state.mc,k:“mc”,min:0.3,max:0.95,step:0.01,d:(state.mc*100).toFixed(0)+”%”},{l:“Lot Size”,v:state.lot,k:“lot”,min:0.01,max:2,step:0.01,d:state.lot.toFixed(2)},{l:“Max Trades”,v:state.mo,k:“mo”,min:1,max:15,step:1,d:state.mo},{l:“Speed”,v:state.spd,k:“spd”,min:200,max:2000,step:50,d:state.spd+“ms”}].forEach(function(c){
html+=’<div style="margin-bottom:16px"><div class="flex between" style="margin-bottom:6px"><span style="font-size:12px;color:#6b7a8e">’+c.l+’</span><span style="font-size:13px;color:'+ac+';font-weight:700">’+c.d+’</span></div><input type=“range” min=”’+c.min+’” max=”’+c.max+’” step=”’+c.step+’” value=”’+c.v+’” oninput=“updateCfg('’+c.k+”’,this.value)" style="width:100%;accent-color:”+ac+’”></div>’});
html+=’</div><div class="flex gap8" style="margin-top:8px"><button onclick="closeAll()" class="btn" style="background:#ffaa0012;color:#ffaa00">CLOSE ALL</button><button onclick="resetAll()" class="btn" style="background:#ff475710;color:#ff4757">RESET</button></div>’;
html+=’<button onclick="clL();state.rem=false;addLog(\'Credentials cleared\',\'system\');render()" class="btn" style="margin-top:8px;background:#1a253810;color:#6b7a8e;border:1px solid #1a2538">\uD83D\uDD12 Forget Saved Login</button>’;
}
html+=’</div><div style="height:60px"></div>’;

/* Bottom nav */
html+=’<div class="bottomnav" style="border-top:1px solid '+ac+'15">’;
[{id:“market”,icon:”\uD83D\uDCCA”,l:“Market”},{id:“signals”,icon:”\uD83D\uDCE1”,l:“Signals”},{id:“history”,icon:”\uD83D\uDCCB”,l:“History”},{id:“settings”,icon:”\u2699\uFE0F”,l:“Config”}].forEach(function(t){
html+=’<button onclick=“state.tab='’+t.id+’';render()” style=“color:’+(state.tab===t.id?ac:”#3e4a5c”)+’”><span>’+t.icon+’</span><span style="font-weight:'+(state.tab===t.id?700:400)+'">’+t.l+”</span></button>”});
html+=”</div>”;
return html;
}

/* Actions */
function doConnect(){
if(!state.srv||!state.lid||!state.pw)return;
if(state.rem)savL(state.srv,state.lid,state.pw,state.aT);else clL();
state.step=1;state.cLog=[];render();
var msgs=[“Connecting to “+state.srv+”…”,“TLS 1.3 encrypted”,“Auth #”+state.lid+”…”,“Verified \u2713”,“Syncing…”,”\u2713 Connected to “+state.srv];
var i=0;var run=function(){if(i>=msgs.length){var b=state.aT===“live”?10000:100000;state.bal=b;state.eq=b;state.aI={login:state.lid,server:state.srv,type:state.aT,co:state.srv.split(”-”)[0],bal:b};state.step=2;render();setTimeout(function(){state.scr=“trade”;render()},600);return}state.cLog.push(msgs[i]);render();i++;setTimeout(run,400)};run();
}
function doLogout(){state.scr=“login”;state.on=false;state.step=0;clearInterval(interval);render()}
function toggleBot(){state.on=!state.on;addLog(state.on?“Started”:“Stopped”,“system”);if(state.on)startLoop();else clearInterval(interval);render()}
function updateCfg(k,v){state[k]=parseFloat(v);savC(state.mc,state.lot,state.mo,state.spd);render()}
function closeAll(){state.trades=state.trades.map(function(t){return t.status===“LIVE”?Object.assign({},t,{status:“CLOSED”}):t});addLog(“All closed”,“system”);render()}
function resetAll(){state.trades=[];state.signals=[];state.stats={w:0,l:0,pips:0,str:0,best:0,pft:0};state.bal=state.aI?state.aI.bal:10000;state.logs=[];render()}

function startLoop(){
clearInterval(interval);
interval=setInterval(function(){
tick++;var eng=state.engines;var np={};
PAIRS.forEach(function(p){var r=eng[p.s].tick(p.sp);np[p.s]={bid:r.bid,ask:r.ask,h:eng[p.s].hist.slice()}});
state.prices=np;
if(tick%8===0){
var pair=PAIRS[Math.floor(Math.random()*PAIRS.length)];var s=gS(eng[pair.s].hist,pair,STRATS);
var entry=s.dir===“BUY”?np[pair.s].ask:np[pair.s].bid;
var tp=s.dir===“BUY”?entry+s.s.tp*pair.pip:entry-s.s.tp*pair.pip;
var sl=s.dir===“BUY”?entry-s.s.sl*pair.pip:entry+s.s.sl*pair.pip;
var sg={id:Date.now()+Math.random(),pair:pair.s,label:pair.l,dir:s.dir,conf:s.conf,entry:entry,tp:tp,sl:sl,strat:s.s.name,color:s.s.color,re:s.re,time:new Date(),pips:0,tpP:s.s.tp,slP:s.s.sl,cur:entry,dec:pair.d,pip:pair.pip,lot:state.lot,ticket:Math.floor(Math.random()*9e7)+1e7};
state.signals.unshift(sg);if(state.signals.length>40)state.signals.pop();
if(s.conf>=state.mc){var ac=state.trades.filter(function(t){return t.status===“LIVE”}).length;
if(ac<state.mo){addLog(”#”+sg.ticket+” “+s.dir+” “+pair.l+” @ “+entry.toFixed(pair.d),“open”);state.trades.unshift(Object.assign({},sg,{status:“LIVE”}))}}}
var fl=0;
state.trades=state.trades.map(function(t){if(t.status!==“LIVE”)return t;var c=eng[t.pair].price;
var pips=t.dir===“BUY”?(c-t.entry)/t.pip:(t.entry-c)/t.pip;var pnl=pips*t.lot*10;fl+=pnl;
if(pips>=t.tpP){state.bal+=pnl;state.stats.w++;state.stats.pips+=pips;state.stats.str++;state.stats.best=Math.max(state.stats.best,state.stats.str);state.stats.pft+=pnl;addLog(”\u2726 TP “+t.label+” +”+pips.toFixed(1)+“p”,“win”);return Object.assign({},t,{status:“TP”,pips:+pips.toFixed(1),cur:c,pnl:pnl})}
if(pips<=-t.slP){var ls=Math.abs(pnl);state.bal-=ls;state.stats.l++;state.stats.pips+=pips;state.stats.str=0;state.stats.pft-=ls;addLog(”\u2717 SL “+t.label+” “+pips.toFixed(1)+“p”,“loss”);return Object.assign({},t,{status:“SL”,pips:+pips.toFixed(1),cur:c,pnl:-ls})}
return Object.assign({},t,{pips:+pips.toFixed(1),cur:c,pnl:pnl})});
state.eq=state.bal+fl;
render();
},state.spd);
}
render();
</script>
